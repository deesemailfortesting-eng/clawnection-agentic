<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">wtfradar iOS app icon</title>
  <desc id="desc">A Chromia-colored radar mark with concentric rings, a gold signal sweep, and a heart center.</desc>
  <defs>
    <linearGradient id="ios-bg" x1="22" y1="16" x2="158" y2="164" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8E58A5"/>
      <stop offset=".52" stop-color="#3F1525"/>
      <stop offset="1" stop-color="#24101B"/>
    </linearGradient>
    <radialGradient id="ios-glow" cx="57" cy="36" r="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2C9DC" stop-opacity=".34"/>
      <stop offset=".43" stop-color="#D982AA" stop-opacity=".12"/>
      <stop offset="1" stop-color="#3F1525" stop-opacity="0"/>
    </radialGradient>
    <filter id="ios-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#10060D" flood-opacity=".38"/>
    </filter>
  </defs>
  <rect width="180" height="180" rx="42" fill="url(#ios-bg)"/>
