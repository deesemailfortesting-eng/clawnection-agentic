    <circle cx="90" cy="92" r="35" fill="none" stroke="#D982AA" stroke-width="9" opacity=".88"/>
    <path d="M90 92 129 47" stroke="#D9BF41" stroke-width="10" stroke-linecap="round"/>
    <circle cx="129" cy="47" r="10" fill="#D9BF41"/>
    <path d="M90 111c-13-10-24-19-24-31 0-8 6-14 14-14 5 0 9 2 12 6 3-4 7-6 12-6 8 0 14 6 14 14 0 12-11 21-28 31Z" fill="#F2C9DC"/>
  </g>
