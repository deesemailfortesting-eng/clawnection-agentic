name: Test agent heartbeat

# Wakes up the synthetic test-agent fleet every 5 minutes by hitting the
# secret-gated /api/cron-heartbeat endpoint on the deployed worker. Each
# call rotates through up to 10 test agents (oldest last_tick_at first),
# so all 20 cycle every ~10 minutes.
#
# Runs on GitHub-hosted runners, free for public repos. The GitHub secret
# CRON_HEARTBEAT_SECRET must match the Cloudflare worker secret of the
# same name.

on:
  schedule:
    # Every 5 minutes. Cron expressions on GitHub run in UTC and have a
    # minimum granularity of 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI / `gh workflow run`.
    inputs:
      limit:
        description: "Max number of test agents to process this tick (1–10)"
        required: false
        default: "10"

permissions:
  contents: read

concurrency:
  # If a previous run is still going (slow Anthropic call, network issue),
  # let it finish — drop the new firing so we don't double-tick agents.
  group: cron-heartbeat
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger heartbeat
        env:
          BASE_URL: https://clawnection-agentic.deesemailfortesting.workers.dev
          CRON_HEARTBEAT_SECRET: ${{ secrets.CRON_HEARTBEAT_SECRET }}
          LIMIT: ${{ github.event.inputs.limit || '10' }}
        run: |
          if [ -z "$CRON_HEARTBEAT_SECRET" ]; then
            echo "::error::CRON_HEARTBEAT_SECRET secret is not set on the repo"
            exit 1
          fi
          echo "Calling $BASE_URL/api/cron-heartbeat?limit=$LIMIT"
          response=$(curl -s -w "\n%{http_code}" \
            "$BASE_URL/api/cron-heartbeat?limit=$LIMIT" \
            -H "Authorization: Bearer $CRON_HEARTBEAT_SECRET")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$body" | head -c 4000
          if [ "$http_code" -ne 200 ]; then
            echo "::error::Heartbeat returned non-200 status"
            exit 1
          fi
